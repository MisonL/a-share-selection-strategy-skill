name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: python3 -m pip install -r skills/a-share-selection-strategy/requirements-parquet.txt
      - name: Validate JSON files
        run: |
          for file in skills/a-share-selection-strategy/evals/*.json skills/a-share-selection-strategy/configs/*.json; do
            python3 -m json.tool "$file" >/tmp/"$(basename "$file")"
          done
      - name: Validate agent manifest
        run: |
          python3 - <<'PY'
          import yaml
          from pathlib import Path
          assert yaml.safe_load(Path("skills/a-share-selection-strategy/agents/openai.yaml").read_text())["interface"]["display_name"]
          PY
      - name: Compile scripts
        run: |
          PYTHONPYCACHEPREFIX=/tmp/a-share-selection-pycache python3 -m py_compile skills/a-share-selection-strategy/scripts/*.py
      - name: Run tests
        run: PYTHONDONTWRITEBYTECODE=1 python3 -m unittest discover -s tests -v
